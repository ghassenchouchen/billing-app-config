# ECR Token Auto-Refresh CronJob
# ECR tokens expire every 12 hours. This job refreshes the ecr-secret every 6 hours.
# Prerequisites: AWS credentials must be stored in a K8s Secret called 'aws-ecr-creds'

# First Create the secret once manually.


---
# ServiceAccount for the CronJob
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ecr-refresh-sa
  namespace: billing-prod

---
# Role: Allow creating/updating Secrets in billing-prod
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ecr-refresh-role
  namespace: billing-prod
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch", "delete"]

---
# Bind the Role to the ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ecr-refresh-binding
  namespace: billing-prod
subjects:
  - kind: ServiceAccount
    name: ecr-refresh-sa
    namespace: billing-prod
roleRef:
  kind: Role
  name: ecr-refresh-role
  apiGroup: rbac.authorization.k8s.io

---
# CronJob: Refreshes ecr-secret every 6 hours
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ecr-token-refresh
  namespace: billing-prod
spec:
  schedule: "0 */6 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: ecr-refresh-sa
          restartPolicy: OnFailure
          containers:
            - name: ecr-refresh
              image: amazon/aws-cli:2.15.0
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: aws-ecr-creds
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: aws-ecr-creds
                      key: AWS_SECRET_ACCESS_KEY
                - name: AWS_DEFAULT_REGION
                  valueFrom:
                    secretKeyRef:
                      name: aws-ecr-creds
                      key: AWS_DEFAULT_REGION
              command:
                - /bin/sh
                - -c
                - |
                  TOKEN=$(aws ecr get-login-password --region $AWS_DEFAULT_REGION)

                  # Install kubectl
                  curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
                  chmod +x kubectl
                  mv kubectl /usr/local/bin/

                  # Delete old secret and create new one
                  kubectl delete secret ecr-secret -n billing-prod --ignore-not-found
                  kubectl create secret docker-registry ecr-secret \
                    --docker-server=005988778995.dkr.ecr.us-east-1.amazonaws.com \
                    --docker-username=AWS \
                    --docker-password=$TOKEN \
                    -n billing-prod

                  echo "ECR secret refreshed at $(date)"
