apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: billing-frontend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ghassenchouchen/billing-app-config.git
    targetRevision: main
    path: charts/frontend
  destination:
    server: https://kubernetes.default.svc
    namespace: billing-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

